<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>農業部農業創新育成中心標竿學習參訪活動調查</title>
    <script>
      // GitHub Pages SPA redirect
      // 將路徑存到 sessionStorage，然後轉回首頁
      var repo = '/visit-survey-2025';
      var path = window.location.pathname.replace(repo, '');
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('redirect', path + search + hash);
      window.location.replace(repo + '/');
    </script>
  </head>
  <body></body>
</html>
